name: NPM Package
on:
  push:
    branches-ignore:
      - "**"
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: "Package version"
        required: true
      tag:
        description: "Package tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - beta

jobs:
  npm-upload:
    name: NPM Package Build and Upload
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - id: semver
        run: |
          SEMVER="${{ github.event.inputs.version }}"
          if [ -z "$SEMVER" ]; then
            # No manual input, we must be running on a tag
            SEMVER="${GITHUB_REF/refs\/tags\/v/}"
          fi
          echo "::set-output name=semver::${SEMVER}"

      # Ensure npm 11.5.1 or later is installed
      - name: Update npm
        run: npm install -g npm@latest
      - run: npm ci
      - run: npm version --no-git-tag-version "${{ steps.semver.outputs.semver }}"
      - run: npm run build

      - name: Publish
        run: |
          RELEASE_TAG="${{ github.event.inputs.tag }}"
          if [ -z "$RELEASE_TAG" ]; then
            if echo "${{ steps.semver.outputs.semver }}" | grep -q -- '-beta'; then
              RELEASE_TAG=beta
            else
              RELEASE_TAG=latest
            fi
          fi
          npm publish --tag "$RELEASE_TAG" --access public
